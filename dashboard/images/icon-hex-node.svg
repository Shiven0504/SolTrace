<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hexagon outline -->
  <path d="M32 4L58 18V46L32 60L6 46V18Z" stroke="url(#hnStroke)" stroke-width="3" fill="url(#hnFill)"/>
  <!-- Internal connection lines (triangle network) -->
  <line x1="32" y1="16" x2="18" y2="42" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <line x1="32" y1="16" x2="46" y2="42" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <line x1="18" y1="42" x2="46" y2="42" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <!-- Lines to center -->
  <line x1="32" y1="16" x2="32" y2="33" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="18" y1="42" x2="32" y2="33" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="46" y1="42" x2="32" y2="33" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <!-- Node dots at vertices -->
  <circle cx="32" cy="16" r="4" fill="#818cf8"/>
  <circle cx="18" cy="42" r="4" fill="#22d3ee"/>
  <circle cx="46" cy="42" r="4" fill="#a78bfa"/>
  <!-- Center node -->
  <circle cx="32" cy="33" r="5" fill="url(#hnCenter)"/>
  <circle cx="32" cy="33" r="2.5" fill="#e0e7ff"/>
  <defs>
    <linearGradient id="hnStroke" x1="6" y1="4" x2="58" y2="60">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="hnFill" x1="6" y1="4" x2="58" y2="60">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="hnCenter" x1="27" y1="28" x2="37" y2="38">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
</svg>
